name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e "./mirth-agent-tools[dev,mcp]"
      - run: python -m compileall mirth-agent-tools/src
      - run: python -m pytest mirth-agent-tools
      - run: node bin/mirth-connect-skills.js init --target .npx-smoke --dry-run
      - run: npm pack --dry-run
